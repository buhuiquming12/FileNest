name: Build and publish Windows release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Ensure WiX Toolset 3 is available
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset --yes --no-progress
          }

      - name: Determine release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "1.0.${{ github.run_number }}"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Test and package
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Type all -AppVersion "${{ steps.version.outputs.version }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileNest-${{ steps.version.outputs.version }}-windows-x64
          path: |
            target/package/*.exe
            target/package/*.zip
            target/package/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/package/*.exe
            target/package/*.zip
            target/package/SHA256SUMS.txt
